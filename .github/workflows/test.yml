# Story 1.1 AC3.3 — unit + widget tests on every push and PR.
#
# Integration tests live in a separate workflow (integration_fake.yml) so a
# slow integration suite never blocks fast unit-test feedback, and so the
# two can run in parallel on CI.

name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: ['**']

jobs:
  test:
    name: flutter test (linux, no goldens)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.38.7'
          cache: true

      - name: Log Flutter + Dart versions
        run: |
          flutter --version
          dart --version

      - name: Resolve dependencies
        run: flutter pub get

      - name: Run unit + widget tests
        # WHY SKIP_GOLDENS: golden image comparisons are platform-dependent
        # (macOS vs Linux font rendering ~1.8% pixel diff). The `goldens` job
        # below runs them on macOS so AC11.1 ("all tests green including
        # goldens") holds without blocking the fast Linux job.
        run: flutter test --dart-define=SKIP_GOLDENS=true

  goldens:
    name: golden tests (macos)
    # WHY macos-latest: golden baselines were generated on macOS; running them
    # on the same platform avoids the ~1.8% font-rendering pixel diff seen on
    # Linux. Keeps the merge gate honest without blocking the fast Linux job.
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.38.7'
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      - name: Run golden tests (serial, golden files only)
        # WHY serial + explicit files: golden comparisons are more fragile than
        # regular widget tests. Running only golden-bearing files with a single
        # worker avoids cross-file isolate interference and keeps this job
        # focused on the actual merge gate.
        run: >
          flutter test --concurrency=1
          test/widget/features/onboarding/welcome_screen_test.dart
          test/widget/features/onboarding/camera_permission_screen_test.dart
          test/widget/features/auth/login_screen_test.dart
