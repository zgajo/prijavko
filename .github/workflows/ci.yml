name: CI

on:
  push:
    branches:
      - main
    tags:
      - "**"
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-test-codegen:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prijavko
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Unit / widget tests
        run: flutter test

      - name: Codegen (verify committed outputs)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Fail if generated files drift
        run: git diff --exit-code

  release-appbundle:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prijavko
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Build release AAB (prod defines)
        run: flutter build appbundle --release --dart-define-from-file=config/prod.json

      - uses: actions/upload-artifact@v4
        with:
          name: prijavko-release-aab
          path: prijavko/build/app/outputs/bundle/release/*.aab
