name: prijavko
description: "Croatian eVisitor guest registration for small hosts — fast, offline-tolerant, privacy-first."
publish_to: 'none'
version: 0.1.0

# Dart SDK pinned to the Flutter-stable-aligned Dart version as of project bootstrap.
# AC1.2 floor is >=3.4.0 <4.0.0; we tighten to the installed Flutter stable channel's Dart.
environment:
  sdk: '>=3.10.0 <4.0.0'
  flutter: '>=3.38.0'

dependencies:
  flutter:
    sdk: flutter

  # Story 1.2 AC7.1 — Manrope text theme via the canonical Flutter package.
  # Manrope TTFs are bundled under assets/google_fonts/Manrope/ (AC8); the
  # package auto-detects local assets and skips the HTTP fetch we explicitly
  # forbid in lib/main.dart with `GoogleFonts.config.allowRuntimeFetching = false`.
  google_fonts: ^8.0.2

  # Story 1.2 AC5 — Material Symbols (rounded variant) is the project icon set.
  # `lib/design/icons.dart` re-exports `Symbols` so callers cannot accidentally
  # pull `Icons.*` (Material Icons) — a CI guard (icons_guard.yml) blocks that.
  material_symbols_icons: ^4.2928.1

  # Story 1.3 AC8 — Riverpod state management; @Riverpod(keepAlive: true) codegen only.
  flutter_riverpod: ^2.6.1
  # Story 1.3 AC8 — @riverpod and @Riverpod(keepAlive: true) annotation types.
  riverpod_annotation: ^2.6.1

  # Story 1.3 AC8 — Single auditable Dio instance routed through dioProvider.
  dio: ^5.9.2
  # Story 1.3 AC8 — CookieManager interceptor for persistent session cookies.
  dio_cookie_manager: ^3.4.0
  # Story 1.3 AC4 — PersistCookieJar + Storage interface for encrypted cookie jar.
  cookie_jar: ^4.0.9

  # Story 1.3 AC9 — getApplicationDocumentsDirectory() for cookie jar path.
  path_provider: ^2.1.5

  # Story 1.3 AC7 — Android Keystore-backed credential storage (username/password/apiKey).
  flutter_secure_storage: ^10.0.0

  # Story 1.3 AC2 — AES-256-GCM encryption; delegates to Android Keystore hardware crypto.
  cryptography_flutter: ^2.3.4

  # Story 1.3 AC1 — Synchronous SHA-256 for badCertificateCallback (dart:crypto has no SHA-256).
  crypto: ^3.0.7
  # Story 1.3 AC2 — Low-level AES-GCM primitives (SecretBox, AesGcm, etc.);
  # explicit dep required because cryptography_flutter does not re-export it.
  cryptography: ^2.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  # Flutter-SDK-bundled integration binding. Gives `integration_test/`
  # access to `IntegrationTestWidgetsFlutterBinding`, whose `pumpWidget`
  # drives a real on-device rasterizer so `binding.firstFrameRasterized`
  # actually flips (NFR-P8 / Story 1.1 AC10). Not a third-party prod dep.
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Story 1.3 AC8 — build_runner codegen target for @riverpod annotations.
  riverpod_generator: ^2.6.1
  # Story 1.3 AC8 — Runs Riverpod (and future Freezed/Drift) codegen.
  # IMPORTANT: build_runner runs in dev only — generated *.g.dart files are committed.
  # CI (test.yml, integration_fake.yml) MUST NOT run build_runner.
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  # Story 1.2 AC8.1 — Manrope shipped as bundled assets (not Google Fonts CDN).
  # The `google_fonts` package auto-detects files in this folder by name —
  # filenames must match `Manrope-{Regular,Medium,SemiBold,Bold,ExtraBold}.ttf`
  # exactly. OFL.txt ships alongside per SIL OFL 1.1 §4.
  #
  # Files are listed explicitly (not the parent folder) so that hidden dev
  # artefacts — `.DS_Store` on macOS, `Thumbs.db` on Windows, editor swap
  # files — cannot accidentally bundle into the AAB. Each new font weight
  # or licence document must be added by name; the test in
  # `test/design/offline_fonts_test.dart` asserts OFL.txt is present.
  assets:
    - assets/google_fonts/Manrope/Manrope-Regular.ttf
    - assets/google_fonts/Manrope/Manrope-Medium.ttf
    - assets/google_fonts/Manrope/Manrope-SemiBold.ttf
    - assets/google_fonts/Manrope/Manrope-Bold.ttf
    - assets/google_fonts/Manrope/Manrope-ExtraBold.ttf
    - assets/google_fonts/Manrope/OFL.txt
