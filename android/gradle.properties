# JVM heap sized for CI correctness first. GitHub-hosted `ubuntu-latest`
# runners advertise ~7 GB RAM; `-Xmx4G -XX:MaxMetaspaceSize=1G` leaves headroom
# for the Gradle daemon plus the Android build tools without OOM-killing the
# AAB build. Local Mac dev will run within this budget too — this project's
# build graph does not warrant more.
org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
